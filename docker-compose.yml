services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-dev
    volumes:
      # Claude Code 認証データ（プロジェクトローカル、ホスト非共有）
      - ./claude-auth:/home/claude/.claude
      # プロジェクト専用SSH鍵（ローカルから投入、読み取り専用）
      - ./ssh-keys:/home/claude/.ssh_host:ro
      # Git設定（プロジェクトローカル、読み取り専用）
      - ./config/.gitconfig:/home/claude/.gitconfig:ro
      # 作業ディレクトリ
      - ./workspace:/workspace
      # 仕様書・設計ドキュメント（ホスト側で閲覧可能）
      - ./plans:/workspace/plans
      # プロジェクト設定ファイル（読み取り専用）
      - ./config:/home/claude/project-config:ro
      # カスタムMCPサーバー（読み取り専用）
      - ./mcp-servers:/home/claude/mcp-servers:ro
    env_file:
      - .env
    stdin_open: true
    tty: true
    init: true
    # セキュリティ強化
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
