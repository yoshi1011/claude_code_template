services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-dev
    volumes:
      # 認証情報・設定の共有
      - ${HOME}/.claude:/home/claude/.claude
      # SSH鍵（読み取り専用、entrypointで~/.sshにコピー・加工される）
      - ${HOME}/.ssh:/home/claude/.ssh_host:ro
      # Git設定（読み取り専用）
      - ${HOME}/.gitconfig:/home/claude/.gitconfig:ro
      # 作業ディレクトリ
      - ./workspace:/workspace
      # 仕様書・設計ドキュメント（ホスト側で閲覧可能）
      - ./plans:/workspace/plans
      # プロジェクト設定ファイル（entrypointでワークスペースにシンボリックリンク作成）
      - ./config:/home/claude/project-config
      # カスタムMCPサーバー
      - ./mcp-servers:/home/claude/mcp-servers
      # SSH Agent フォワーディング（macOS対応）
      - ${SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    env_file:
      - .env
    stdin_open: true
    tty: true
